<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="{% static  'style2.css' %}">
    <link rel="icon" type="image/png" href="{% static 'favicon(4).png' %}">
    <title>Document</title>
</head>

<body>
    
    <main>
        <h1>Add a New Show</h1>
        <form action="{% url 'addshow' %}" method="post">
            {% csrf_token %}
            <label for="Title">Title</label>
            <input type="text" name="title" id="Title" placeholder="Title">
            <label for="Network">Network</label>
            <input type="text" name="network" id="Network" placeholder="Network">
            <label for="Release">Release Date</label>
            <input type="date" name="release_date" id="Release">
            <label for="Description">Description</label>
            <textarea name="desc" placeholder="Description..." id="Description"></textarea>
            <button type="submit">Create</button>
        </form>
        <a href="{% url 'home' %}">Back to home</a>
    </main>
</body>

</html>
